<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-labelledby="t d" version="1.1" xmlns:xlink="http://www.w3.org/1999/xlink">
  <title id="t">WWL — Schiefer emblem</title>
  <desc id="d">
    Square hairline emblem in mist on fog; WWL set in Instrument Serif with italic middle W, framed by a JetBrains Mono caption.
  </desc>
  <rect width="200" height="200" fill="#D8E4EA"></rect>
  <rect x="20" y="20" width="160" height="160" fill="none" stroke="#97B0BE" stroke-width="1"></rect>
  <line x1="20" y1="56" x2="180" y2="56" stroke="#97B0BE" stroke-width="1"></line>
  <line x1="20" y1="144" x2="180" y2="144" stroke="#97B0BE" stroke-width="1"></line>
  <g font-family="'JetBrains Mono', ui-monospace, Menlo, monospace" font-size="8" letter-spacing="1.8" fill="#567C91">
    <text x="30" y="42">N° 01</text>
    <text x="170" y="42" text-anchor="end">WWL</text>
  </g>
  <g fill="none" stroke="#324C5B" stroke-width="13" stroke-linejoin="miter" stroke-linecap="butt" stroke-miterlimit="8">
    <polyline points="50,60 80,125 100,75 120,125 150,60"></polyline>
  </g>
  <polygon points="100,125 89,120 100,92 111,120" fill="#567C91"></polygon>
  <g font-family="'JetBrains Mono', ui-monospace, Menlo, monospace" font-size="8" letter-spacing="2.2" fill="#324C5B">
    <text x="100" y="166" text-anchor="middle">WOLF · WERLER</text>
  </g>
</svg>