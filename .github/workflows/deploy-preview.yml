name: Deploy Preview to GitHub Pages

on:
  push:
    branches: [preview]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout preview branch
        uses: actions/checkout@v4
        with:
          ref: preview
          path: preview-src

      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-src

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: preview-src/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: preview-src
        run: pnpm install --frozen-lockfile

      - name: Build preview with Vite
        working-directory: preview-src
        run: pnpm exec vite build --base=/preview/

      - name: Assemble combined deploy directory
        run: |
          mkdir -p deploy
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='worker' \
            --exclude='dist' \
            --exclude='package.json' \
            --exclude='pnpm-lock.yaml' \
            --exclude='pnpm-workspace.yaml' \
            --exclude='vite.config.js' \
            --exclude='todo.md' \
            --exclude='README.md' \
            --exclude='MEMORY.md' \
            --exclude='.gitignore' \
            main-src/ deploy/
          mkdir -p deploy/preview
          rsync -a preview-src/dist/ deploy/preview/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./deploy

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
